    <script>
  const amount = 120;

  for (let i = 0; i < amount; i++) {
    const star = document.createElement('div');

    const x = Math.random() * 100;  // posição % da largura
    const y = Math.random() * 100;  // posição % da altura
    const size = Math.random() < 0.1 ? 4    // 10% grandes
              : Math.random() < 0.3 ? 3    // 20% médias
              : 1.5;                      // 70% pequenas
    const yellow = Math.random() < 0.1;
    const opacity = 0.4 + Math.random() * 0.6;
    const duration = 1 + Math.random() * 4;      // ← velocidade aleatória
    const delay = Math.random() * 5;            // ← começa em momentos diferentes

    star.style.cssText = `
      position: fixed;
      left: ${x}vw;
      top: ${y}vh;
      width: ${size}px;
      height: ${size}px;
      background: ${yellow ? '#ffd700' : '#ffffff'};
      border-radius: 50%;
      opacity: ${opacity};
      pointer-events: none;
      z-index: 0;
      animation: blink ${duration}s ${delay}s infinite;
    `;

    document.body.appendChild(star);
  }
</script>
